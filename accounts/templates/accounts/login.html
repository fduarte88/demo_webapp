<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | AgendaPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --accent: #0ea5e9;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #0ea5e9 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .login-card {
      background: #fff;
      border-radius: 1.25rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      padding: 2rem 2rem 1.5rem;
      text-align: center;
      color: #fff;
    }

    .login-header .logo-icon {
      width: 64px;
      height: 64px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 2rem;
    }

    .login-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .login-header p {
      font-size: 0.875rem;
      opacity: 0.85;
      margin-bottom: 0;
    }

    .login-body {
      padding: 2rem;
    }

    .form-floating label {
      color: #6b7280;
    }

    .form-floating > .form-control:focus ~ label,
    .form-floating > .form-control:not(:placeholder-shown) ~ label {
      color: var(--primary);
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.15);
    }

    .input-group-text {
      background: #f8fafc;
      border-right: none;
      color: #6b7280;
    }

    .btn-login {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.025em;
      transition: all 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .alert {
      border-radius: 0.75rem;
      font-size: 0.875rem;
    }

    .login-footer {
      text-align: center;
      padding: 1rem 2rem 1.5rem;
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .toggle-password {
      cursor: pointer;
      background: #f8fafc;
      border-left: none;
      color: #6b7280;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: var(--primary);
    }

    @media (max-width: 576px) {
      .login-header {
        padding: 1.5rem 1.5rem 1.25rem;
      }
      .login-body {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-header">
        <div class="logo-icon">
          <i class="bi bi-calendar2-check-fill"></i>
        </div>
        <h1>AgendaPro</h1>
        <p>Sistema de gestión de clientes y citas</p>
      </div>

      <div class="login-body">
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'danger' }} alert-dismissible fade show d-flex align-items-center gap-2" role="alert">
              <i class="bi bi-exclamation-circle-fill"></i>
              <span>{{ message }}</span>
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}

        <form method="post" novalidate>
          {% csrf_token %}

          <div class="mb-3">
            <label for="username" class="form-label fw-semibold text-secondary small">
              <i class="bi bi-person me-1"></i>Usuario
            </label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
              <input
                type="text"
                class="form-control"
                id="username"
                name="username"
                placeholder="Ingresa tu usuario"
                value="{{ request.POST.username }}"
                autocomplete="username"
                autofocus
                required
              >
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold text-secondary small">
              <i class="bi bi-lock me-1"></i>Contraseña
            </label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                placeholder="Ingresa tu contraseña"
                autocomplete="current-password"
                required
              >
              <button class="btn btn-outline-secondary toggle-password" type="button" id="togglePwd" tabindex="-1">
                <i class="bi bi-eye" id="toggleIcon"></i>
              </button>
            </div>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-login text-white">
              <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
            </button>
          </div>
        </form>
      </div>

      <div class="login-footer">
        <i class="bi bi-shield-check me-1"></i>Conexión segura &nbsp;|&nbsp; AgendaPro &copy; 2025
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('togglePwd').addEventListener('click', function () {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('toggleIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });
  </script>
</body>
</html>
